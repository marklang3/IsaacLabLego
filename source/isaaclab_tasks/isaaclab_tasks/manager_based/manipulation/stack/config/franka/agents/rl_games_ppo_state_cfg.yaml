# COPIED FROM SMOOTH BLOCKS AGENT CONFIG with working fixes applied

params:
  seed: 42

  # environment wrapper clipping
  env:
    clip_observations: 5.0  # Match smooth blocks
    clip_actions: 1.0  # Match smooth blocks
    # concate_obs_groups defaults to True for state-based training

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [256, 128, 64]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: franka_stack
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      scale_value: 1.0  # Match smooth blocks
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 5e-4  # Match smooth blocks (5e-4 works for smooth, should work for LEGO too)
    lr_schedule: adaptive
    schedule_type: standard
    kl_threshold: 0.008
    score_to_win: 10000
    max_epochs: 100000
    save_best_after: 200
    save_frequency: 100
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.0  # Match baseline (0.0 proved successful - reward 288!)
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 16384
    mini_epochs: 5
    critic_coef: 4
    clip_value: True
    clip_actions: False
    seq_len: 4
    bounds_loss_coef: 0.0001
